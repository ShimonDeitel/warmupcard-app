<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Warmupcard</title>
<style>
  body { margin:0; background:#1C1B29; color:#F4F1FA; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:80px 24px; text-align:center; }
  h1 { color:#8E7CC3; font-size:2.2rem; margin-bottom:0.5rem; }
  p { line-height:1.6; opacity:0.9; }
  .feature { margin-top:2.5rem; padding:20px; border:1px solid #8E7CC344; border-radius:12px; }
  a { color:#8E7CC3; }
  footer { margin-top:3rem; font-size:0.85rem; opacity:0.6; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #8E7CC355 0%, #8E7CC300 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Warmupcard</h1>
    <p>Check off your personal warm-up routine before every workout and log completion.</p>
    <div class="feature">
      <strong>Free:</strong> Warmupcard logs your data locally, no account needed.<br>
      <strong>Pro:</strong> Multiple saved routines and completion-streak tracking
    </div>
    <footer>
      <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
      Contact: s0533495227@gmail.com
    </footer>
  </div>
</body>
</html>
