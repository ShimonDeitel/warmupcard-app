name: Warmupcard
options:
  bundleIdPrefix: com.shimondeitel.warmupcard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Warmupcard:
    type: application
    platform: iOS
    sources:
      - path: Warmupcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warmupcard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Warmupcard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WarmupcardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WarmupcardTests
      - path: Warmupcard.storekit
    dependencies:
      - target: Warmupcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warmupcard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WarmupcardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WarmupcardUITests
    dependencies:
      - target: Warmupcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warmupcard.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Warmupcard:
    build:
      targets:
        Warmupcard: all
        WarmupcardTests: [test]
        WarmupcardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Warmupcard.storekit
    test:
      config: Debug
      storeKitConfiguration: Warmupcard.storekit
      targets:
        - WarmupcardTests
        - WarmupcardUITests
    archive:
      config: Release
